{% extends "base.html" %}

{% block title %}Profile - Paw Hub{% endblock %}
{% block page_title %}Profile{% endblock %}
{% block subtitle %}Manage your personal information{% endblock %}

{% block content %}

<div class="row g-4">

  <!-- Left: Profile Info -->
  <div class="col-lg-4">
    <div class="card p-4 rounded-4 shadow-sm border-0 text-center">

      <img src="{{ url_for('static', filename='images/cat.png') }}"
           class="rounded-circle mb-3"
           width="100" height="100">

      <h5 class="fw-bold mb-1">Jordan</h5>
      <p class="text-muted mb-3">Pet Owner</p>

      <button class="btn btn-outline-primary rounded-pill px-4">
        Change Photo
      </button>

    </div>
  </div>

  <!-- Right: Editable Form -->
  <div class="col-lg-8">
    <div class="card p-4 rounded-4 shadow-sm border-0">

      <h6 class="fw-semibold mb-3">Personal Information</h6>

      <form>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control custom-input" value="Jordan">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control custom-input" value="jordan@email.com">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control custom-input" value="012-3456789">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select custom-input">
              <option selected>Male</option>
              <option>Female</option>
            </select>
          </div>
        </div>

        <hr class="my-4">

        <h6 class="fw-semibold mb-3">Change Password</h6>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control custom-input">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control custom-input">
          </div>
        </div>

        <div class="text-end mt-3">
          <button type="submit" class="btn btn-primary rounded-pill px-4">
            Save Changes
          </button>
        </div>

      </form>

    </div>
  </div>

</div>

{% endblock %}
