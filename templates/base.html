<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Paw Hub{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand d-flex align-items-center gap-2">
        <img src="../static/images/logo.png" alt="Logo" width="70" height="70">
        <span class="fw-bold text-gradient">Paw Hub</span>
      </div>

      <nav class="sidebar-menu mt-4">
        <a href="{{ url_for('owner_dashboard') }}" class="sidebar-link{% if request.endpoint == 'owner_dashboard' %} active{% endif %}"> <i class="bi bi-house fs-5 me-1"></i>Dashboard</a>
        <a href="{{ url_for('owner_services') }}" class="sidebar-link{% if request.endpoint == 'owner_services' %} active{% endif %}"> <i class="bi bi-list-check fs-5 me-1"></i>Services</a>
        <a href="{{ url_for('owner_applications') }}" class="sidebar-link{% if request.endpoint == 'owner_applications' %} active{% endif %}"> <i class="bi bi-file-earmark-text fs-5 me-1"></i>Applications</a>
        <a href="{{ url_for('notifications') }}" class="sidebar-link{% if request.endpoint == 'notifications' %} active{% endif %}"> <i class="bi bi-bell fs-5 me-1"></i>Notifications</a>
        <a href="{{ url_for('profile') }}" class="sidebar-link{% if request.endpoint == 'profile' %} active{% endif %}"> <i class="bi bi-person fs-5 me-1"></i>Profile</a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main-wrapper">

      <!-- Top Header -->
      <header class="topbar d-flex justify-content-between align-items-center">
        <div>
          <h3 class="mb-0">{% block page_title %}Dashboard{% endblock %}</h3>
        </div>

        <div class="d-flex align-items-center gap-3">
          <button type="button" class="icon-btn d-inline-flex align-items-center gap-2" id="logout-btn">
            <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
            <span id="logout-text">Logout</span>
          </button>
          <div class="profile-chip d-flex align-items-center gap-2">
            <img src="../static/images/cat.png" alt="Profile" class="profile-avatar" width="34" height="34">
            <span>My Account</span>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        {% block content %}{% endblock %}
      </main>

    </div>
  </div>

  {% block page_scripts %}{% endblock %}
</body>
</html>
