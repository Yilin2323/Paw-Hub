<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Paw Hub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="auth-card">

      <div class="text-center mb-4">
        <img src="../static/images/logo.png" alt="Logo" width="90" height="90" class="mb-2">
        <h4 class="fw-bold mb-1">Paw Hub</h4>
        <p class="text-muted mb-0">Welcome back</p>
      </div>

      <h2 class="text-center fw-bold mb-4">Sign In</h2>

      <form>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control custom-input" placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control custom-input" placeholder="Enter your password">
        </div>

        <div class="text-end mb-3">
          <a href="#" class="small text-decoration-none">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">Sign In</button>

        <p class="text-center mt-4 mb-0">
          Don’t have an account?
          <a href="signup.html" class="text-decoration-none fw-semibold">Create Account</a>
        </p>
      </form>

    </div>
  </div>

</body>
</html>
