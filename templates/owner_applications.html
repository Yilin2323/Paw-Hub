{% extends "base.html" %}

{% block title %}Applications - Paw Hub{% endblock %}
{% block page_title %}Applications{% endblock %}

{% block content %}
<div class="owner-applications-page owner-anchor-target" id="applications-top">

  <div class="oa-stats row g-3" role="group" aria-label="Application counts — click to filter">
    <div class="col-auto">
      <button type="button" class="oa-stat oa-stat--filter" data-oa-filter="pending" aria-pressed="false">
        <span class="oa-stat__icon oa-stat__icon--pending" aria-hidden="true"><i class="bi bi-hourglass-split"></i></span>
        <div>
          <span class="oa-stat__value" id="oa-stat-pending">0</span>
          <span class="oa-stat__label d-block">Pending</span>
        </div>
      </button>
    </div>
    <div class="col-auto">
      <button type="button" class="oa-stat oa-stat--filter" data-oa-filter="approved" aria-pressed="false">
        <span class="oa-stat__icon oa-stat__icon--approved" aria-hidden="true"><i class="bi bi-patch-check-fill"></i></span>
        <div>
          <span class="oa-stat__value" id="oa-stat-approved">0</span>
          <span class="oa-stat__label d-block">Approved</span>
        </div>
      </button>
    </div>
    <div class="col-auto">
      <button type="button" class="oa-stat oa-stat--filter" data-oa-filter="rejected" aria-pressed="false">
        <span class="oa-stat__icon oa-stat__icon--rejected" aria-hidden="true"><i class="bi bi-x-circle"></i></span>
        <div>
          <span class="oa-stat__value" id="oa-stat-rejected">0</span>
          <span class="oa-stat__label d-block">Rejected</span>
        </div>
      </button>
    </div>
  </div>

  <div class="oa-filters" role="toolbar" aria-label="Filter application cards">
    <span class="oa-filters__label" id="oa-filter-label">Show</span>
    <div class="oa-filters__pills" role="group" aria-labelledby="oa-filter-label">
      <button type="button" class="oa-pill is-active" data-oa-filter="all">All</button>
      <button type="button" class="oa-pill" data-oa-filter="pending">Pending</button>
      <button type="button" class="oa-pill" data-oa-filter="approved">Approved</button>
      <button type="button" class="oa-pill" data-oa-filter="rejected">Rejected</button>
    </div>
  </div>

  <div
    id="oa-cards-root"
    class="row g-4"
    data-applicant-avatar="{{ url_for('static', filename='images/cat.png') }}"
  ></div>

</div>
{% endblock %}

{% block page_scripts %}
<script type="application/json" id="pawhub-owner-applications-json">{{ owner_applications_payload | tojson }}</script>
<script>
  window.PAWHUB_OWNER_APPLICATIONS = JSON.parse(
    document.getElementById("pawhub-owner-applications-json").textContent
  );
</script>
<script src="{{ url_for('static', filename='js/owner_applications.js') }}"></script>
{% endblock %}
