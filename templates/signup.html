<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Paw Hub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <div class="container min-vh-100 d-flex justify-content-center align-items-center py-5">
    <div class="auth-card">

      <div class="text-center mb-4">
        <img src="../static/images/logo.png" alt="Logo" width="90" height="90" class="mb-2">
        <h4 class="fw-bold mb-1">Paw Hub</h4>
        <p class="text-muted mb-0">Join Paw Hub today</p>
      </div>

      <h2 class="text-center fw-bold mb-4">Create Account</h2>

      <form>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Role</label>
            <select class="form-select custom-input">
              <option selected disabled>Select role</option>
              <option>Pet Owner</option>
              <option>Pet Sitter</option>
            </select>
          </div>
      
          <div class="col-md-6 mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select custom-input">
              <option selected disabled>Select gender</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
        </div>
      
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control custom-input" placeholder="Enter username">
          </div>
      
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control custom-input" placeholder="Enter phone number">
          </div>
        </div>
      
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control custom-input" placeholder="Enter email">
        </div>
      
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control custom-input" placeholder="Enter password">
          </div>
      
          <div class="col-md-6 mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control custom-input" placeholder="Confirm password">
          </div>
        </div>
      
        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-2">
          Create Account
        </button>
      
      </form>

    </div>
  </div>

</body>
</html>
